[camera]
preferred_device_id=
width=640
height=480
fps=30

[recognition]
cascade_path=assets/lbpcascade_frontalface.xml
database_path=storage/win_face_db.yml
min_face_size_px=60
identify_threshold=55.0
enroll_samples=12

[log]
log_dir=storage/win_logs
max_file_bytes=10485760
max_roll_files=5

[ui]
window_width=1280
window_height=800
preview_scale_mode=0

[dnn]
enable=1
model_path=storage/models/opencv_face_detector_uint8.pb
config_path=storage/models/opencv_face_detector.pbtxt
input_width=300
input_height=300
scale=1.0
mean_b=104
mean_g=177
mean_r=123
swap_rb=0
conf_threshold=0.50
backend=0
target=0

[http]
enable=1
port=8080

[poster]
enable=0
post_url=http://localhost:8080/api/faces
throttle_ms=100
backoff_min_ms=200
backoff_max_ms=5000

[display]
output_index=0
width=0
height=0
refresh_numerator=0
refresh_denominator=1
vsync=1
swapchain_buffers=2
fullscreen=0
allow_system_mode_switch=0
enable_srgb=1
gamma=2.200000
color_temp_k=6500
aa_samples=1
aniso_level=1

