; ==============================================================================
; [IMPORTANT] - THIS IS A LEGACY MIGRATION CONFIGURATION FILE
; ==============================================================================
; This INI file is only used for backward compatibility and initial migration.
; When the program runs for the first time, it reads this file and automatically
; converts it to JSON format, saving it to: %APPDATA%\rk_wcfr\config.json
; 
; After the initial run, the JSON file becomes the single Source of Truth.
; All subsequent configuration changes should be made via the Web UI 
; (PUT /api/v1/settings) or by editing the config.json file directly.
; Modifying this INI file after the JSON has been generated will have NO EFFECT.
; ==============================================================================

[camera]
preferred_device_id=
width=640
height=480
fps=30

[recognition]
; Default cascade classifier path. The xml is included in the repo at:
; app/src/main/assets/lbpcascade_frontalface.xml
; and automatically copied during Windows build.
cascade_path=assets/lbpcascade_frontalface.xml
database_path=storage/win_face_db.yml
min_face_size_px=60
identify_threshold=55.0
enroll_samples=12

[log]
log_dir=storage/win_logs
max_file_bytes=10485760
max_roll_files=5

[ui]
window_width=1280
window_height=800
preview_scale_mode=0

[dnn]
; ==============================================================================
; NOTE: OpenCV DNN Face Detector Models (ResNet SSD)
; The following .pb and .pbtxt files are NOT included in the repository due to size.
; You MUST download them manually and place them in the specified 'storage/models/' directory.
; Download Links:
; - opencv_face_detector_uint8.pb:
;   https://github.com/opencv/opencv_3rdparty/raw/dnn_samples_face_detector_20180205_fp16/res10_300x300_ssd_iter_140000_fp16.caffemodel
;   (Note: Use the correct fp16/uint8 model as per your configuration)
; - opencv_face_detector.pbtxt:
;   https://raw.githubusercontent.com/opencv/opencv_extra/master/testdata/dnn/opencv_face_detector.pbtxt
; ==============================================================================
enable=1
model_path=storage/models/opencv_face_detector_uint8.pb
config_path=storage/models/opencv_face_detector.pbtxt
input_width=300
input_height=300
scale=1.0
mean_b=104
mean_g=177
mean_r=123
swap_rb=0
conf_threshold=0.50
backend=0
target=0

[http]
enable=1
port=8080

[poster]
enable=0
post_url=http://localhost:8080/api/faces
throttle_ms=100
backoff_min_ms=200
backoff_max_ms=5000

[display]
output_index=0
width=0
height=0
refresh_numerator=0
refresh_denominator=1
vsync=1
swapchain_buffers=2
fullscreen=0
allow_system_mode_switch=0
enable_srgb=1
gamma=2.200000
color_temp_k=6500
aa_samples=1
aniso_level=1

