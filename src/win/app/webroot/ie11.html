<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>浏览器不受支持</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial,
          'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: #0b1220;
        color: rgba(255, 255, 255, 0.88);
      }
      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 40px 16px;
      }
      .card {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 20px 18px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        line-height: 1.35;
      }
      p {
        margin: 8px 0;
        line-height: 1.6;
      }
      .hint {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px dashed rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.75);
        font-size: 14px;
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
      }
      a {
        color: #7db7ff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>当前页面不支持 IE11</h1>
        <p>
          本控制台使用现代前端技术（React 18 / TypeScript 5 / Ant Design 5），IE11
          无法正常运行。
        </p>
        <p>
          请使用：Edge / Chrome / Firefox 等现代浏览器打开本地地址（示例：
          <code>http://127.0.0.1:8080/</code>）。
        </p>
        <div class="hint">
          <p>
            如果您必须在旧环境中访问，请让运维/开发提供“IE11 专用静态页”或截图导出。
          </p>
          <p>
            诊断建议：在其他浏览器访问 <a href="./">返回主页</a>，确认本地服务已启动。
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
