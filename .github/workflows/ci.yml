name: ci

on:
  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches: [ "master" ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: repo-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Scan workspace junk (dry-run)
        run: node scripts/clean-repo-junk.js scan --ci
      - name: Upload cleanup reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cleanup-reports
          path: |
            ErrorLog/cleanup
          if-no-files-found: ignore

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++
      - name: Configure (skip OpenCV)
        run: cmake -S . -B build_ci -G "Ninja" -DRK_SKIP_OPENCV=ON -DRK_BUILD_CORE_UNIT_TESTS=ON
      - name: Build core_unit_tests
        run: cmake --build build_ci --target core_unit_tests -j 2
      - name: Run tests
        run: ctest --test-dir build_ci --output-on-failure

      - name: Install OpenCV headers (cross-platform smoke test)
        run: sudo apt-get install -y libopencv-dev

      - name: Compile-check cross-platform source files
        run: |
          CXXFLAGS="-std=c++17 -c -o /dev/null -Isrc/win/include -Isrc/cpp/include $(pkg-config --cflags opencv4)"
          g++ $CXXFLAGS src/win/src/FaceDetector.cpp
          g++ $CXXFLAGS src/win/src/LbphEmbedder.cpp
          g++ $CXXFLAGS src/win/src/DnnSsdFaceDetector.cpp

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-unit-tests-reports
          path: build_ci/Testing/
          if-no-files-found: ignore

  docs-audit:
    name: docs-sync-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Docs Sync Audit
        run: node scripts/docs-sync-audit.js --out-dir tests/reports/docs-sync-audit --link-cache tests/reports/docs-sync-audit/link-cache.json

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-audit-reports
          path: tests/reports/docs-sync-audit/
          if-no-files-found: ignore

  web:
    name: web-build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: "web/pnpm-lock.yaml"

      - name: Install dependencies
        run: cd web && pnpm install

      - name: Lint
        run: cd web && pnpm lint

      - name: Build
        run: cd web && pnpm build

      - name: Test (E2E)
        continue-on-error: true
        run: |
          cd web
          pnpm preview > /tmp/preview.log 2>&1 &
          PREVIEW_PID=$!
          sleep 5
          pnpm e2e:run:coverage || echo "E2E tests failed but continuing..."
          kill $PREVIEW_PID || true

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage-reports
          path: |
            web/coverage/
            web/cypress/videos/
            web/cypress/screenshots/
            /tmp/preview.log
          if-no-files-found: ignore

  android:
    name: android-build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Configure Gradle timeouts
        run: |
          mkdir -p ~/.gradle
          echo "systemProp.org.gradle.internal.http.connectionTimeout=60000" >> ~/.gradle/gradle.properties
          echo "systemProp.org.gradle.internal.http.socketTimeout=60000" >> ~/.gradle/gradle.properties
      - name: Build and Test (Skip OpenCV)
        run: ./gradlew -PRK_SKIP_OPENCV=true :app:assembleDebug :app:testDebugUnitTest :app:lintDebug --no-daemon

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-reports
          path: |
            app/build/reports/
            app/build/intermediates/lint_intermediate_text_report/debug/lintReportDebug/lint-results-debug.txt
            app/build/outputs/
          if-no-files-found: ignore

  windows:
    name: windows-build-test
    if: >
      github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      OPENCV_VERSION: "4.10.0"
      OPENCV_CONTRIB_VERSION: "4.10.0"
      DEPS_DIR: _deps
      BUILD_DIR: build_ci_win
      CMAKE_GENERATOR: Visual Studio 17 2022
      CMAKE_PLATFORM: x64
      CMAKE_BUILD_CONFIG: Release
      # Must match RK_OPENCV_FULL_LIBS in cmake/opencv.cmake (minus "opencv_" prefix).
      # Currently: core imgproc imgcodecs objdetect features2d flann calib3d dnn ml photo face video videoio highgui stitching
      OPENCV_BUILD_LIST: "core,imgproc,imgcodecs,objdetect,features2d,flann,calib3d,dnn,ml,photo,face,video,videoio,highgui,stitching"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: clean-repo-junk dry-run scan (CI)
        shell: pwsh
        run: |
          node --version
          node scripts/clean-repo-junk.js scan --ci

      - name: Cache _deps (opencv sources, GTest build)
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.DEPS_DIR }}
            ${{ env.BUILD_DIR }}/_deps/googletest-build
          key: deps-${{ runner.os }}-opencv-${{ env.OPENCV_VERSION }}-contrib-${{ env.OPENCV_CONTRIB_VERSION }}-v1
          restore-keys: |
            deps-${{ runner.os }}-opencv-${{ env.OPENCV_VERSION }}-contrib-${{ env.OPENCV_CONTRIB_VERSION }}-
            deps-${{ runner.os }}-opencv-

      - name: Fetch OpenCV + opencv_contrib sources into _deps
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $repoRoot = $env:GITHUB_WORKSPACE
          $deps = Join-Path $repoRoot $env:DEPS_DIR
          New-Item -ItemType Directory -Force -Path $deps | Out-Null

          function Ensure-Repo {
            param(
              [Parameter(Mandatory=$true)][string]$RepoUrl,
              [Parameter(Mandatory=$true)][string]$DestDir,
              [Parameter(Mandatory=$true)][string]$Ref
            )
            if (-not (Test-Path (Join-Path $DestDir ".git"))) {
              Write-Host "Cloning $RepoUrl ($Ref) -> $DestDir"
              git clone --depth 1 --branch $Ref $RepoUrl $DestDir
              return
            }
            Write-Host "Reusing cached repo: $DestDir"
            git -C $DestDir fetch --depth 1 origin $Ref
            git -C $DestDir checkout --force $Ref
          }

          $opencvDir = Join-Path $deps "opencv"
          $opencvContribDir = Join-Path $deps "opencv_contrib"

          Ensure-Repo -RepoUrl "https://github.com/opencv/opencv.git" -DestDir $opencvDir -Ref $env:OPENCV_VERSION
          Ensure-Repo -RepoUrl "https://github.com/opencv/opencv_contrib.git" -DestDir $opencvContribDir -Ref $env:OPENCV_CONTRIB_VERSION

          "OPENCV_ROOT=$opencvDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENCV_CONTRIB_ROOT=$opencvContribDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "OPENCV_ROOT=$opencvDir"
          Write-Host "OPENCV_CONTRIB_ROOT=$opencvContribDir"

      - name: Configure (CMake)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake --version
          cmake -S . -B $env:BUILD_DIR -G "$env:CMAKE_GENERATOR" -A $env:CMAKE_PLATFORM `
            -DOPENCV_ROOT="$env:OPENCV_ROOT" `
            -DOPENCV_CONTRIB_ROOT="$env:OPENCV_CONTRIB_ROOT" `
            -DBUILD_LIST="$env:OPENCV_BUILD_LIST"

      - name: Build unit tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # 只构建并运行单元测试套件。win_face_database_perf 是性能基准
          # （约 80s 且依赖 OpenCV FileStorage 往返，环境敏感），不参与 PR 门禁。
          cmake --build $env:BUILD_DIR --config $env:CMAKE_BUILD_CONFIG --target core_unit_tests win_unit_tests face_infer_unit_tests core_gtest_tests -- /m

      - name: Run ctest
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # 仅运行单元测试套件，排除性能基准 win_face_database_perf
          ctest --test-dir $env:BUILD_DIR -C $env:CMAKE_BUILD_CONFIG -R "unit_tests|core_gtest_tests" --output-on-failure

      - name: Check for model/quantize changes
        id: changed-int8
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $baseSha = "${{ github.event.pull_request.base.sha }}"
          $headSha = "${{ github.event.pull_request.head.sha }}"
          if ([string]::IsNullOrEmpty($baseSha)) {
            echo "changed=true" >> $env:GITHUB_OUTPUT
            Write-Host "Not a PR (push/workflow_dispatch) — running INT8 steps"
            return
          }
          try {
              $changed = git diff --name-only $baseSha $headSha 2>$null
              if ($LASTEXITCODE -ne 0) { $changed = @() }
          } catch {
              $changed = @()
          }
          $matched = ($changed | Select-String -Pattern '^models/' -Quiet) -or
                     ($changed | Select-String -Pattern '^scripts/quantize_ncnn_int8\.py' -Quiet) -or
                     ($changed | Select-String -Pattern '^deps/WIDER_train/' -Quiet)
          $int8Changed = if ($matched) { "true" } else { "false" }
          echo "changed=${int8Changed}" >> $env:GITHUB_OUTPUT
          Write-Host "INT8 changed=$matched"

      - name: Quantize models (INT8)
        if: steps.changed-int8.outputs.changed == 'true'
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python scripts/quantize_ncnn_int8.py `
            --model scrfd `
            --fp32-dir "models/scrfd_ncnn" `
            --calib-dir "deps/WIDER_train/WIDER_train/images" `
            --output-dir "models/scrfd_int8_ncnn" `
            --size 640 `
            --num-samples 50

      - name: Run INT8 precision tests
        if: steps.changed-int8.outputs.changed == 'true'
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          ctest --test-dir $env:BUILD_DIR -C $env:CMAKE_BUILD_CONFIG -R face_infer --output-on-failure

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-unit-tests-reports
          path: ${{ env.BUILD_DIR }}/Testing/
          if-no-files-found: ignore
